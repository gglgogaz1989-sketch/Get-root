name: Build Android APK

# Настройки запуска [citation:1][citation:4]
on:
  # Запуск при пуше в любую ветку
  push:
    branches: [ "main", "master", "develop" ]
  
  # Запуск при создании Pull Request
  pull_request:
    branches: [ "main", "master" ]
  
  # Ручной запуск из интерфейса GitHub
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Тип сборки (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# Права доступа
permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Сборка APK
    runs-on: ubuntu-latest  # Используем последнюю версию Ubuntu [citation:1]
    
    steps:
      # 1. Клонируем репозиторий [citation:3]
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Устанавливаем JDK [citation:4][citation:6]
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'  # Используем Zulu OpenJDK
          java-version: '17'
          cache: gradle  # Кэшируем Gradle зависимости
      
      # 3. Кэшируем Gradle для ускорения сборки [citation:8]
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      # 4. Даем права на выполнение gradlew [citation:4]
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      # 5. Сборка debug APK [citation:1][citation:3]
      - name: Build debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        run: ./gradlew assembleDebug --stacktrace
      
      # 6. Сборка release APK (если указано)
      - name: Build release APK
        if: github.event.inputs.build_type == 'release'
        run: ./gradlew assembleRelease --stacktrace
        env:
          # Секреты для подписи [citation:10]
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      
      # 7. Запуск тестов [citation:2][citation:4]
      - name: Run tests
        run: ./gradlew test
      
      # 8. Определяем имя файла и дату
      - name: Set output variables
        id: vars
        run: |
          echo "date_today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "repo_name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      
      # 9. Загружаем APK как артефакт [citation:1][citation:4]
      - name: Upload debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.date_today }}-${{ steps.vars.outputs.repo_name }}-debug-${{ steps.vars.outputs.short_sha }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/logs/  # Логи сборки
      
      # 10. Загружаем release APK
      - name: Upload release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.date_today }}-${{ steps.vars.outputs.repo_name }}-release-${{ steps.vars.outputs.short_sha }}
          path: app/build/outputs/apk/release/*.apk
      
      # 11. Очистка кэша Gradle [citation:4]
      - name: Cleanup Gradle Cache
        if: always()
        run: |
          rm -f ~/.gradle/caches/modules-2/modules-2.lock
          rm -f ~/.gradle/caches/modules-2/gc.properties
