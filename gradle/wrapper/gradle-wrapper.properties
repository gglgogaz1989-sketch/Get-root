# Настройки Gradle Wrapper
# Понедельник, 23 февраля 2026

# Распределение Gradle (binary - только бинарники, all - с исходниками)
distributionType=ALL

# URL для скачивания Gradle (зеркала для быстрой загрузки)
# Основное зеркало (services.gradle.org)
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-all.zip

# Зеркало 1 (Китай) - для ускорения в Азии
# distributionUrl=https\://mirrors.cloud.tencent.com/gradle/gradle-8.4-all.zip

# Зеркало 2 (Европа)
# distributionUrl=https\://gradle.cmgresearch.com/distributions/gradle-8.4-all.zip

# Локальный путь (если Gradle уже скачан)
# distributionUrl=file\:/C:/gradle-8.4-all.zip

# Версия Gradle (должна совпадать с AGP - Android Gradle Plugin)
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists

# Таймауты для скачивания (в миллисекундах)
socketTimeout=120000
connectionTimeout=120000

# Проверка сертификатов (true/false)
validateDistributionUrl=true
